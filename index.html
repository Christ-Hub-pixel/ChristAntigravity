<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeLingo — Learn to Code!</title>
  <meta name="description"
    content="Master Python, JavaScript and more in a gamified, Duolingo-style experience. Earn XP, collect gems, and unlock badges — one lesson at a time." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="index.css" />

  <link rel="icon" href="assets/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1cb0f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CodeLingo" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>

<body>

  <div id="app-wrapper">

    <!-- Top Navbar (Mobile only) -->
    <header id="app-topbar">
      <div class="logo">
        <img src="assets/icon.png" alt="CodeLingo Icon" class="logo-img">
        <span>CodeLingo</span>
      </div>
      <div class="topbar-stats">
        <div class="stat-pill hearts" title="Vies (Cœurs)">
          <span class="stat-icon">❤️</span>
          <span id="topbar-hearts">5</span>
        </div>
        <div class="stat-pill streak" title="Série de jours">
          <span class="stat-icon">🔥</span>
          <span id="topbar-streak">1</span>
        </div>
        <div class="stat-pill gems" title="Gemmes">
          <span class="stat-icon">💎</span>
          <span id="topbar-gems">500</span>
        </div>
        <div class="stat-pill xp" title="Points d'XP">
          <span class="stat-icon">⚡</span>
          <span id="topbar-xp">0</span>
        </div>
        <button id="lang-toggle" class="icon-topbar-btn" onclick="cycleLang()" title="Change language">
          <span id="lang-flag">🇬🇧</span>
        </button>
        <button id="theme-toggle" class="icon-topbar-btn" onclick="cycleTheme()" title="Change theme">
          <span class="theme-icon" id="theme-icon">🌙</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main">
      <!-- Loading splash -->
      <div class="splash-loading">
        <div class="splash-logo" style="font-size: 5rem; line-height: 1;">🚀</div>
        <div class="splash-text">Loading CodeLingo…</div>
        <div class="splash-sub">Apprenez à coder en vous amusant !</div>
      </div>
    </main>

    <!-- Bottom/Side Navigation -->
    <nav id="app-nav">
      <!-- Desktop only: Stats & Toggles -->
      <div class="sidebar-top-section">
        <div class="stat-pill hearts" title="Vies (Cœurs)">
          <span class="stat-icon">❤️</span>
          <span id="sidebar-hearts">5</span>
        </div>
        <div class="stat-pill streak" title="Série de jours">
          <span class="stat-icon">🔥</span>
          <span id="sidebar-streak">1</span>
        </div>
        <div class="stat-pill gems" title="Gemmes">
          <span class="stat-icon">💎</span>
          <span id="sidebar-gems">500</span>
        </div>
        <div class="stat-pill xp" title="Points d'XP">
          <span class="stat-icon">⚡</span>
          <span id="sidebar-xp">0</span>
        </div>
        <div class="sidebar-toggles">
          <button class="icon-btn" onclick="cycleLang()" title="Language" id="lang-toggle-sidebar">🇬🇧</button>
          <button class="icon-btn" onclick="cycleTheme()" title="Theme" id="theme-toggle-sidebar">🌙</button>
        </div>
      </div>

      <div class="nav-item" data-route="#home" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" id="nav-lbl-home">Home</span>
      </div>
      <div class="nav-item" data-route="#courses" id="nav-courses">
        <span class="nav-icon">📚</span>
        <span class="nav-label" id="nav-lbl-courses">Courses</span>
      </div>
      <div class="nav-item" data-route="#leaderboard" id="nav-leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label" id="nav-lbl-rank">Rank</span>
      </div>
      <div class="nav-item" data-route="#profile" id="nav-profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label" id="nav-lbl-profile">Profile</span>
      </div>
    </nav>

  </div>

  <!-- AI Tutor Interface -->
  <button class="ai-fab" onclick="toggleAIChat()" title="Lingo AI Tutor">🤖</button>
  <div id="ai-chat-container" class="ai-chat-container" style="display:none;"></div>

  <!-- Data Layer -->
  <script src="data/i18n.js"></script>
  <script src="data/gamification.js"></script>
  <script src="data/courses.js"></script>

  <!-- App Core -->
  <script src="app.js"></script>

  <!-- Components -->
  <script src="components/auth.js"></script>
  <script src="components/home.js"></script>
  <script src="components/course.js"></script>
  <script src="components/lesson.js"></script>
  <script src="components/leaderboard.js"></script>
  <script src="components/profile.js"></script>
  <script src="components/ai.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('🚀 Service Worker registered:', reg.scope))
          .catch(err => console.warn('❌ Service Worker registration failed:', err));
      });
    }
  </script>

</body>

</html>
