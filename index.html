<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CodeLingo — Learn to Code while having fun!</title>
  <meta name="description"
    content="Master Python and JavaScript gamification-style. Earn XP, unlock badges, and build real skills — one lesson at a time." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
  <link rel="stylesheet" href="index.css" />

  <!-- Favicon via emoji -->
  <link rel="icon" href="assets/icon.png" type="image/png" />
</head>

<body>

  <div id="app-wrapper">

    <!-- Top Navbar -->
    <header id="app-topbar">
      <div class="logo">
        <img src="assets/icon.png" alt="CodeLingo Icon" style="height: 32px; border-radius: 6px; margin-right: 8px;">
        <span>CodeLingo</span>
      </div>
      <div class="topbar-stats">
        <div class="stat-pill streak">
          <span class="stat-icon">🔥</span>
          <span id="topbar-streak">1</span>
        </div>
        <div class="stat-pill xp">
          <span class="stat-icon">⚡</span>
          <span id="topbar-xp">0</span>
        </div>
        <button id="lang-toggle" onclick="cycleLang()" title="Change language">
          <span id="lang-flag">🇬🇧</span>
          <span id="lang-short">EN</span>
        </button>
        <button id="theme-toggle" onclick="cycleTheme()" title="Change theme">
          <span class="theme-icon" id="theme-icon">🌙</span>
          <span id="theme-label">Dark</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main">
      <!-- Pages are rendered here by JS -->
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
        <img src="assets/logo.png" alt="CodeLingo Logo" style="width: 240px; margin-bottom: 20px; animation: float 3s infinite ease-in-out;">
        <div style="color:var(--text-secondary);font-weight:700;font-size:1.2rem;letter-spacing:0.02em;">Loading CodeLingo…</div>
        <div style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;font-style:italic;">Apprenez à coder en vous amusant !</div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </main>

    <!-- Bottom/Side Navigation -->
    <nav id="app-nav">
      <!-- Desktop only: Stats & Toggles -->
      <div class="sidebar-top-section">
        <div class="stat-pill streak">
          <span class="stat-icon">🔥</span>
          <span id="sidebar-streak">1</span>
        </div>
        <div class="stat-pill xp">
          <span class="stat-icon">⚡</span>
          <span id="sidebar-xp">0</span>
        </div>
        <div class="sidebar-toggles">
          <button class="icon-btn" onclick="cycleLang()" title="Language">🇬🇧</button>
          <button class="icon-btn" onclick="cycleTheme()" title="Theme">🌙</button>
        </div>
      </div>

      <div class="nav-item" data-route="#home" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" id="nav-lbl-home">Home</span>
      </div>
      <div class="nav-item" data-route="#courses" id="nav-courses">
        <span class="nav-icon">📚</span>
        <span class="nav-label" id="nav-lbl-courses">Courses</span>
      </div>
      <div class="nav-item" data-route="#leaderboard" id="nav-leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label" id="nav-lbl-rank">Rank</span>
      </div>
      <div class="nav-item" data-route="#profile" id="nav-profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label" id="nav-lbl-profile">Profile</span>
      </div>
    </nav>

  </div>

  <!-- Data Layer -->
  <script src="data/i18n.js"></script>
  <script src="data/gamification.js"></script>
  <script src="data/courses.js"></script>

  <!-- App Core: defines `routes` object and state — MUST load before components -->
  <script src="app.js"></script>

  <!-- Components (may extend `routes` and reference app functions) -->
  <script src="components/auth.js"></script>
  <script src="components/home.js"></script>
  <script src="components/course.js"></script>
  <script src="components/lesson.js"></script>
  <script src="components/leaderboard.js"></script>
  <script src="components/profile.js"></script>

</body>

</html>
