<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CodeLingo — Learn to Code!</title>
  <!-- SEO & Social Meta Tags -->
  <meta name="description" content="Apprenez à coder gratuitement avec CodeLingo. Des leçons interactives, un playground Python/JS et un tuteur IA pour progresser comme sur Mimo ou Duolingo." />
  <meta name="keywords" content="apprendre code, python, javascript, tutoriel, programmation, codelingo, mimo, duolingo code" />
  <meta property="og:title" content="CodeLingo — Apprenez à coder en vous amusant !" />
  <meta property="og:description" content="Maîtrisez le développement web et la data science avec nos leçons gamifiées." />
  <meta property="og:image" content="https://codelingo.app/assets/og-image.png" />
  <meta property="og:url" content="https://codelingo.app" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="index.css" />

  <link rel="icon" href="assets/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1cb0f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CodeLingo" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>

<body>
  <!-- Offline Indicator -->
  <div id="offline-banner" class="offline-banner">
    <span>📡</span> <span id="offline-text">Mode hors-ligne activé</span>
  </div>

  <!-- Custom Modal System -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-card" class="modal-card">
      <div id="modal-icon" class="modal-icon">⚠️</div>
      <div id="modal-title" class="modal-title">Attention</div>
      <div id="modal-message" class="modal-message">Êtes-vous sûr ?</div>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Annuler</button>
        <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <div id="app-wrapper">

    <!-- Top Navbar (Mobile only) -->
    <header id="app-topbar">
      <div class="logo">
        <img src="assets/icon.png" alt="CodeLingo Icon" class="logo-img">
        <span>CodeLingo</span>
      </div>
      <div class="topbar-stats">
        <div class="stat-item" title="${t('stat_hearts')}">
          <span class="stat-icon icon-red">❤️</span>
          <span id="topbar-hearts">5</span>
        </div>
        <div class="stat-pill streak" title="Série de jours : Apprenez chaque jour pour ne pas perdre votre série ! 🔥">
          <span class="stat-icon">🔥</span>
          <span id="topbar-streak">1</span>
        </div>
        <div class="stat-pill gems" title="Gemmes : Utilisez-les pour recharger vos vies ou acheter des bonus. 💎">
          <span class="stat-icon">💎</span>
          <span id="topbar-gems">500</span>
        </div>
        <div class="stat-pill xp" title="Points d'XP : Gagnez de l'expérience en complétant des leçons. ⚡">
          <span class="stat-icon">⚡</span>
          <span id="topbar-xp">0</span>
        </div>
        <div class="stat-item notification-bell-wrapper" onclick="toggleNotifications()" title="Notifications">
          <span class="stat-icon topbar-stat-btn">🔔</span>
          <span id="notification-badge" class="notification-badge hidden"></span>
          <div id="notification-dropdown" class="notification-dropdown hidden">
            <div class="notif-header">Notifications</div>
            <div id="notif-list" class="notif-list">
              <!-- Dynamically populated -->
              <div class="notif-empty">Aucune nouvelle notification</div>
            </div>
          </div>
        </div>
        <div class="stat-item" onclick="toggleSettings()" title="Paramètres">
          <span class="stat-icon topbar-stat-btn">⚙️</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main">
      <!-- Loading splash -->
      <div class="splash-loading">
        <div class="splash-logo">🚀</div>
        <div class="splash-text">Loading CodeLingo…</div>
        <div class="splash-sub">Apprenez à coder en vous amusant !</div>
      </div>
    </main>

    <!-- Bottom/Side Navigation -->
    <nav id="app-nav">
      <!-- Desktop only: Stats & Toggles -->
      <div class="sidebar-top-section">
        <div class="stat-pill hearts" title="Vies (Cœurs)">
          <span class="stat-icon">❤️</span>
          <span id="sidebar-hearts">5</span>
        </div>
        <div class="stat-pill streak" title="Série de jours : Apprenez chaque jour pour ne pas perdre votre série ! 🔥">
          <span class="stat-icon">📅</span>
          <span class="stat-value" id="top-streak">1</span>
        </div>
        <div class="stat-pill gems" title="Gemmes : Utilisez-les pour recharger vos vies ou acheter des bonus. 💎">
          <span class="stat-icon">💎</span>
          <span id="sidebar-gems">500</span>
        </div>
        <div class="stat-pill xp" title="Points d'XP : Gagnez de l'expérience en complétant des leçons. ⚡">
          <span class="stat-icon">⚡</span>
          <span id="sidebar-xp">0</span>
        </div>
      </div>

      <div class="nav-item" data-route="#home" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" id="nav-lbl-home">Home</span>
      </div>
      <div class="nav-item" data-route="#courses" id="nav-courses">
        <span class="nav-icon">📚</span>
        <span class="nav-label" id="nav-lbl-courses">Courses</span>
      </div>
      <div class="nav-item" data-route="#leaderboard" id="nav-leaderboard">
        <span class="nav-icon">🏆</span>
        <span class="nav-label" id="nav-lbl-rank">Rank</span>
      </div>
      <div class="nav-item" data-route="#playground" id="nav-playground">
        <span class="nav-icon">🧪</span>
        <span class="nav-label" id="nav-lbl-playground">Playground</span>
      </div>
      <div class="nav-item" data-route="#reference" id="nav-reference">
        <span class="nav-icon">📖</span>
        <span class="nav-label" id="nav-lbl-reference">Reference</span>
      </div>

      <div class="nav-item nav-profile-wrapper" id="nav-profile" data-route="#profile" onclick="toggleProfileMenu()">
        <span class="nav-icon" id="nav-profile-avatar">👤</span>
        <span class="nav-label" id="nav-lbl-profile">Profil</span>
        <!-- Profile dropdown -->
        <div class="profile-menu" id="profile-menu">
          <div class="profile-menu-user">
            <span class="profile-menu-avatar" id="profile-menu-avatar">👤</span>
            <span class="profile-menu-name" id="profile-menu-name">Utilisateur</span>
          </div>
          <button class="profile-menu-item" onclick="event.stopPropagation(); navigate('#profile'); closeProfileMenu()">
            <span>👤</span> Mon Profil
          </button>
          <button class="profile-menu-item" onclick="event.stopPropagation(); openLangModal(); closeProfileMenu()">
            <span>🌐</span> Changer la langue
          </button>
          <button class="profile-menu-item" onclick="event.stopPropagation(); cycleTheme(); closeProfileMenu()">
            <span>🎨</span> Thème
          </button>
          <hr class="profile-menu-divider">
          <button class="profile-menu-item profile-menu-logout" onclick="event.stopPropagation(); logoutUser()">
            <span>🚪</span> Déconnexion
          </button>
        </div>
      </div>

      <div class="nav-item hidden" id="install-app-btn">
        <span class="nav-icon">📲</span>
        <span class="nav-label">Installer</span>
      </div>

      <!-- Quick Toggles (Desktop Sidebar) -->
      <div class="sidebar-bottom-section">
        <button class="icon-btn" onclick="cycleLang()" title="Change Language">
          <span id="lang-flag">🇬🇧</span> <span id="lang-short">EN</span>
        </button>
        <button class="icon-btn" onclick="cycleTheme()" title="Toggle Theme">
          <span id="theme-icon">🌙</span>
        </button>
        <button class="icon-btn" onclick="navigate('#about')" title="À propos">
          <span>ℹ️</span>
        </button>
      </div>
    </nav>

  </div>

  <!-- AI Tutor Interface -->
  <button class="ai-fab" onclick="toggleAIChat()" title="Lingo AI Tutor">🤖</button>
  <div id="ai-chat-container" class="ai-chat-container" style="display:none;"></div>

  <!-- Smart Quick Settings Panel -->
  <div id="settings-panel-container" class="settings-panel-container" style="display:none;"></div>

  <!-- Data Layer -->
  <script src="./data/gamification.js"></script>
  <script src="./data/i18n.js"></script>
  <script src="./data/courses.js"></script>
  <script src="./data/reference.js"></script>

  <!-- Components -->
  <script src="./components/auth.js"></script>
  <script src="./components/home.js"></script>
  <script src="./components/course.js"></script>
  <script src="./components/lesson.js"></script>
  <script src="./components/leaderboard.js"></script>
  <script src="./components/profile.js"></script>
  <script src="./components/ai.js"></script>
  <script src="./components/settings.js"></script>
  <script src="./components/sandbox.js"></script>
  <script src="./components/reference.js"></script>
  <script src="./components/tutorial.js"></script>
  <script src="./components/about.js"></script>

  <!-- Core -->
  <script src="./app.js" defer></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('🚀 Service Worker registered:', reg.scope))
          .catch(err => console.warn('❌ Service Worker registration failed:', err));
      });
    }
  </script>

</body>

</html>
